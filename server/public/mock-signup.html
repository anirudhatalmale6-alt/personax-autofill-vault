<!doctype html>
<html><head><meta charset="utf-8"><title>Create account — Mock Outlook</title>
<style>
 body{font-family:Segoe UI,Arial,sans-serif;background:#f3f3f3;margin:0;color:#1b1b1b}
 .box{max-width:440px;margin:40px auto;background:#fff;padding:34px;border-radius:6px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
 h1{font-size:22px;margin:0 0 6px}.sub{color:#666;font-size:13px;margin-bottom:22px}
 label{display:block;font-size:12px;color:#444;margin:14px 0 5px;font-weight:600}
 input,select{width:100%;box-sizing:border-box;padding:10px;border:1px solid #ccc;border-radius:4px;font-size:14px}
 .row{display:flex;gap:10px}.row>div{flex:1}
 button{margin-top:22px;width:100%;padding:11px;background:#0067b8;color:#fff;border:0;border-radius:4px;font-size:15px;cursor:pointer}
</style></head>
<body>
<div class="box">
  <h1>Create account</h1>
  <div class="sub">Mock Outlook-style signup — for testing the Alt+X autofill</div>
  <form autocomplete="off">
    <div class="row">
      <div><label for="fn">First name</label><input id="fn" name="firstName" autocomplete="given-name"></div>
      <div><label for="ln">Last name</label><input id="ln" name="lastName" autocomplete="family-name"></div>
    </div>
    <label for="em">New email</label>
    <input id="em" name="email" type="email" autocomplete="username" placeholder="someone@outlook.com">
    <label for="pw">Create password</label>
    <input id="pw" name="password" type="password" autocomplete="new-password">
    <label for="pw2">Confirm password</label>
    <input id="pw2" name="confirmPassword" type="password" autocomplete="new-password">
    <label>Birth date</label>
    <div class="row">
      <div><input id="bm" name="BirthMonth" placeholder="Month"></div>
      <div><input id="bd" name="BirthDay" placeholder="Day"></div>
      <div><input id="by" name="BirthYear" placeholder="Year"></div>
    </div>
    <label for="co">Country/region</label>
    <select id="co" name="country">
      <option value="">Select…</option>
      <option>United States</option>
      <option>Philippines</option>
      <option>India</option>
      <option>Japan</option>
    </select>
    <label for="rp">Recovery phone</label>
    <input id="rp" name="phone" type="tel" placeholder="+63…">
    <label for="re">Recovery email</label>
    <input id="re" name="recoveryEmail" type="email">
    <button type="button">Next</button>
  </form>
</div>
</body></html>
